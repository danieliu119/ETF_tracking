name: Active ETF Sync

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # и§Јжұә Node.js 20 иӯҰе‘Ҡ

      - name: Set up Python
        uses: actions/setup-python@v5 # и§Јжұә Node.js 20 иӯҰе‘Ҡ
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install -r render_minimal/requirements.txt

      - name: Run sync script
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          # е‘ҠиЁҙ Python еңЁе“ӘиЈЎжүҫдҪ зҡ„и…іжң¬жӘ”жЎҲ
          export PYTHONPATH=$PYTHONPATH:$(pwd)/render_minimal
          python render_minimal/run_active_etf_job.py
