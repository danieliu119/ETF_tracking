name: Active ETF Sync

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # 升級版本解決警告

      - name: Set up Python
        uses: actions/setup-python@v5 # 升級版本解決警告
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install -r render_minimal/requirements.txt

      - name: Run sync script
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          # 關鍵修正：確保 Python 能找到 render_minimal 資料夾內的模組
          export PYTHONPATH=$PYTHONPATH:$(pwd)/render_minimal
          python render_minimal/run_active_etf_job.py
